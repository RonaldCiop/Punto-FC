<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestione Aziende Commerciale</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:   #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary:  #ebebea;
      --text-primary:   #1a1a18;
      --text-secondary: #6b6b68;
      --text-tertiary:  #9b9b97;
      --border-light:  rgba(0,0,0,.10);
      --border-medium: rgba(0,0,0,.18);
      --radius-md: 8px;
      --radius-lg: 12px;
      /* semantic */
      --green-bg:   #EAF3DE; --green-text:   #27500A;
      --red-bg:     #FCEBEB; --red-text:     #A32D2D;
      --amber-bg:   #FAEEDA; --amber-text:   #633806;
      --blue-bg:    #E6F1FB; --blue-text:    #185FA5;
      --info-bg:    #E6F1FB; --info-text:    #185FA5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary:   #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-tertiary:  #333330;
        --text-primary:   #f0f0ec;
        --text-secondary: #a0a09c;
        --text-tertiary:  #6b6b68;
        --border-light:  rgba(255,255,255,.10);
        --border-medium: rgba(255,255,255,.18);
        --green-bg:   #173404; --green-text:   #C0DD97;
        --red-bg:     #501313; --red-text:     #F7C1C1;
        --amber-bg:   #412402; --amber-text:   #FAC775;
        --blue-bg:    #042C53; --blue-text:    #B5D4F4;
        --info-bg:    #042C53; --info-text:    #B5D4F4;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Layout shell ─────────────────────────────────────── */
    .shell {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    /* ── Header ───────────────────────────────────────────── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 1.5rem;
    }
    .app-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .app-title i { font-size: 22px; color: var(--info-text); }

    /* ── Ufficio switcher ─────────────────────────────────── */
    .ufficio-switcher { display: flex; gap: 6px; }
    .uff-btn {
      padding: 6px 18px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-medium);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all .15s;
    }
    .uff-btn:hover { background: var(--bg-secondary); }
    .uff-btn.cesena.active  { background: var(--info-bg);  color: var(--info-text);  border-color: transparent; }
    .uff-btn.forli.active   { background: var(--green-bg); color: var(--green-text); border-color: transparent; }
    .uff-btn.tutte.active   { background: var(--amber-bg); color: var(--amber-text); border-color: transparent; }

    /* ── Note inline edit ─────────────────────────────────── */
    .note-edit-wrap { display: inline-flex; align-items: center; gap: 4px; }
    .note-inline-input {
      font-size: 12px;
      padding: 2px 6px;
      border: 0.5px solid var(--border-medium);
      border-radius: 4px;
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      width: 160px;
    }
    .note-inline-input:focus { border-color: var(--info-text); }
    .btn-note-edit {
      background: none; border: none; cursor: pointer;
      color: var(--text-tertiary); padding: 0 2px;
      font-size: 13px; line-height: 1;
      transition: color .15s;
    }
    .btn-note-edit:hover { color: var(--info-text); }
    .btn-note-save {
      background: none; border: none; cursor: pointer;
      color: var(--green-text); padding: 0 2px;
      font-size: 13px; line-height: 1;
    }
    .btn-note-cancel {
      background: none; border: none; cursor: pointer;
      color: var(--red-text); padding: 0 2px;
      font-size: 13px; line-height: 1;
    }

    /* ── Stat cards ───────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: .75rem 1rem;
    }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-val   { font-size: 24px; font-weight: 600; }

    /* ── Nav tabs ─────────────────────────────────────────── */
    .nav-tabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      border-bottom: 0.5px solid var(--border-light);
      padding-bottom: 8px;
      margin-bottom: 1rem;
    }
    .nav-tab {
      padding: 5px 14px;
      border-radius: var(--radius-md);
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all .15s;
    }
    .nav-tab:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .nav-tab.active { background: var(--bg-secondary); color: var(--text-primary); }

    /* ── Section card ─────────────────────────────────────── */
    .section {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Form ─────────────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 1.5fr 1fr 1.5fr auto;
      gap: 10px;
      align-items: end;
    }
    @media (max-width: 680px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .form-grid .btn-add { grid-column: 1 / -1; }
    }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 7px 10px;
      font-size: 13px;
      border: 0.5px solid var(--border-medium);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: border-color .15s;
    }
    input[type="text"]:focus,
    input[type="date"]:focus,
    select:focus { border-color: var(--info-text); box-shadow: 0 0 0 3px rgba(24,95,165,.12); }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-medium);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      transition: all .15s;
    }
    .btn:hover { background: var(--bg-secondary); }
    .btn-primary { background: var(--info-bg); color: var(--info-text); border-color: transparent; }
    .btn-primary:hover { opacity: .85; background: var(--info-bg); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-danger { color: var(--red-text); border-color: transparent; background: transparent; }
    .btn-danger:hover { background: var(--red-bg); }
    .btn-export { margin-left: auto; font-size: 12px; }

    /* ── List controls ────────────────────────────────────── */
    .list-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .list-controls select { width: auto; font-size: 12px; padding: 5px 8px; }

    /* ── Company items ────────────────────────────────────── */
    .company-list { display: flex; flex-direction: column; gap: 6px; }

    .company-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-light);
      gap: 12px;
      transition: border-color .15s;
    }
    .company-item:hover { border-color: var(--border-medium); }

    .company-info { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
    .company-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .company-meta { font-size: 12px; color: var(--text-secondary); }

    .item-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .item-actions select { width: auto; font-size: 11px; padding: 3px 6px; }

    /* ── Status badges ────────────────────────────────────── */
    .status-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: .2px;
    }
    .s-evasa   { background: var(--green-bg); color: var(--green-text); }
    .s-chiusa  { background: var(--red-bg);   color: var(--red-text);   }
    .s-assunto { background: var(--amber-bg); color: var(--amber-text); }
    .s-pending { background: var(--bg-tertiary); color: var(--text-secondary); }
    .s-attiva  { background: var(--blue-bg);  color: var(--blue-text);  }

    /* ── Month group headers ──────────────────────────────── */
    .month-group-header {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: .6px;
      padding: 8px 0 4px;
      border-bottom: 0.5px solid var(--border-light);
      margin-bottom: 4px;
    }

    /* ── Empty state ──────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-tertiary);
      font-size: 13px;
    }

    /* ── Toast ────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a18;
      color: #f0f0ec;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <header class="app-header">
    <div class="app-title">
      <i class="ti ti-building-store"></i>
      Gestione Aziende
    </div>
    <div class="ufficio-switcher">
      <button class="uff-btn cesena active" onclick="setUfficio('cesena')">Cesena</button>
      <button class="uff-btn forli"         onclick="setUfficio('forli')">Forlì</button>
      <button class="uff-btn tutte"         onclick="setUfficio('tutte')">Tutte le filiali</button>
    </div>
  </header>

  <!-- Stat cards -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Tabs -->
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="insert"  onclick="switchTab('insert')">Inserisci</button>
    <button class="nav-tab"        data-tab="attive"  onclick="switchTab('attive')">Attive</button>
    <button class="nav-tab"        data-tab="evase"   onclick="switchTab('evase')">Evase</button>
    <button class="nav-tab"        data-tab="chiuse"  onclick="switchTab('chiuse')">Chiuse</button>
    <button class="nav-tab"        data-tab="assunto" onclick="switchTab('assunto')">Hanno assunto</button>
    <button class="nav-tab"        data-tab="all"     onclick="switchTab('all')">Tutte</button>
  </div>

  <!-- ── TAB: INSERT ──────────────────────────────────────── -->
  <div id="tab-insert">
    <div class="section">
      <div class="section-title"><i class="ti ti-plus"></i> Nuova azienda &mdash;</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Nome azienda *</label>
          <input type="text" id="inputNome" placeholder="Es. Rossi Srl" />
        </div>
        <div class="form-group">
          <label>Stato ricerca</label>
          <select id="inputStato">
            <option value="pending">&mdash; in attesa &mdash;</option>
            <option value="attiva">Attiva</option>
            <option value="evasa">Evasa</option>
            <option value="chiusa">Chiusa</option>
            <option value="assunto">Hanno assunto da soli</option>
          </select>
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="inputData" />
        </div>
        <div class="form-group">
          <label>Note (opzionale)</label>
          <input type="text" id="inputNote" placeholder="Es. richiedono elettricisti" />
        </div>
        <button class="btn btn-primary btn-add" onclick="addCompany()">
          <i class="ti ti-check"></i> Aggiungi
        </button>
      </div>
    </div>
  </div>

  <!-- ── TAB: ELENCO (all) ─────────────────────────────────── -->
  <div id="tab-all" style="display:none">
    <div class="section">
      <div class="section-title" style="justify-content:space-between">
        <span><i class="ti ti-list"></i> Elenco</span>
        <button class="btn btn-sm btn-export" onclick="exportCSV('all')"><i class="ti ti-download"></i> Esporta CSV</button>
      </div>
      <div class="list-controls">
        <select id="sortAll" onchange="renderAll()">
          <option value="dateDesc">Data ↓ (recenti prima)</option>
          <option value="dateAsc">Data ↑ (vecchi prima)</option>
          <option value="alpha">Alfabetico A→Z</option>
        </select>
        <select id="filterAll" onchange="renderAll()">
          <option value="">Tutti gli stati</option>
          <option value="pending">In attesa</option>
          <option value="attiva">Attiva</option>
          <option value="evasa">Evase</option>
          <option value="chiusa">Chiuse</option>
          <option value="assunto">Hanno assunto</option>
        </select>
      </div>
      <div class="company-list" id="listAll"></div>
    </div>
  </div>

  <!-- ── TAB: ATTIVE ───────────────────────────────────────── -->
  <div id="tab-attive" style="display:none">
    <div class="section">
      <div class="section-title" style="justify-content:space-between">
        <span><i class="ti ti-loader"></i> Ricerche Attive</span>
        <button class="btn btn-sm btn-export" onclick="exportCSV('attive')"><i class="ti ti-download"></i> Esporta CSV</button>
      </div>
      <div class="list-controls">
        <select id="sortAttive" onchange="renderAttive()">
          <option value="dateDesc">Data ↓</option>
          <option value="dateAsc">Data ↑</option>
          <option value="alpha">Alfabetico</option>
          <option value="month">Per mese</option>
        </select>
      </div>
      <div class="company-list" id="listAttive"></div>
    </div>
  </div>

  <!-- ── TAB: EVASE ────────────────────────────────────────── -->
  <div id="tab-evase" style="display:none">
    <div class="section">
      <div class="section-title" style="justify-content:space-between">
        <span><i class="ti ti-circle-check"></i> Ricerche Evase</span>
        <button class="btn btn-sm btn-export" onclick="exportCSV('evase')"><i class="ti ti-download"></i> Esporta CSV</button>
      </div>
      <div class="list-controls">
        <select id="sortEvase" onchange="renderEvase()">
          <option value="dateDesc">Data ↓</option>
          <option value="dateAsc">Data ↑</option>
          <option value="alpha">Alfabetico</option>
          <option value="month">Per mese</option>
        </select>
      </div>
      <div class="company-list" id="listEvase"></div>
    </div>
  </div>

  <!-- ── TAB: CHIUSE ───────────────────────────────────────── -->
  <div id="tab-chiuse" style="display:none">
    <div class="section">
      <div class="section-title" style="justify-content:space-between">
        <span><i class="ti ti-circle-x"></i> Ricerche Chiuse</span>
        <button class="btn btn-sm btn-export" onclick="exportCSV('chiuse')"><i class="ti ti-download"></i> Esporta CSV</button>
      </div>
      <div class="list-controls">
        <select id="sortChiuse" onchange="renderChiuse()">
          <option value="dateDesc">Data ↓</option>
          <option value="dateAsc">Data ↑</option>
          <option value="alpha">Alfabetico</option>
          <option value="month">Per mese</option>
        </select>
      </div>
      <div class="company-list" id="listChiuse"></div>
    </div>
  </div>

  <!-- ── TAB: ASSUNTO ──────────────────────────────────────── -->
  <div id="tab-assunto" style="display:none">
    <div class="section">
      <div class="section-title" style="justify-content:space-between">
        <span><i class="ti ti-user-check"></i> Hanno assunto da soli</span>
        <button class="btn btn-sm btn-export" onclick="exportCSV('assunto')"><i class="ti ti-download"></i> Esporta CSV</button>
      </div>
      <div class="list-controls">
        <select id="sortAssunto" onchange="renderAssunto()">
          <option value="dateDesc">Data ↓</option>
          <option value="dateAsc">Data ↑</option>
          <option value="alpha">Alfabetico</option>
          <option value="month">Per mese</option>
        </select>
      </div>
      <div class="company-list" id="listAssunto"></div>
    </div>
  </div>

  <!-- ── TAB: TUTTE (vista combinata) ─────────────────────── -->
  <!-- Note: "Tutte" tab is handled by tab-all above -->

</div><!-- /shell -->

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   DATA LAYER
   ═══════════════════════════════════════════════════════════ */

const STORAGE_KEY = 'gestione_aziende_v3';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { cesena: [], forli: [] };
    const parsed = JSON.parse(raw);
    // migrate old flat array
    if (Array.isArray(parsed)) return { cesena: parsed, forli: [] };
    return parsed;
  } catch(e) { return { cesena: [], forli: [] }; }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); } catch(e) {}
}

let DB = loadData();
let currentUfficio = 'cesena'; // 'cesena' | 'forli' | 'tutte'

function getList() {
  if (currentUfficio === 'tutte') {
    // merge, tag with ufficio
    const c = DB.cesena.map(x => ({...x, _ufficio:'cesena'}));
    const f = DB.forli.map(x  => ({...x, _ufficio:'forli'}));
    return [...c, ...f];
  }
  return DB[currentUfficio].map(x => ({...x, _ufficio: currentUfficio}));
}

function getWriteList() {
  if (currentUfficio === 'tutte') return DB.cesena; // fallback: write to cesena
  return DB[currentUfficio];
}

/* ═══════════════════════════════════════════════════════════
   UFFICIO SWITCHER
   ═══════════════════════════════════════════════════════════ */
function setUfficio(uf) {
  currentUfficio = uf;
  document.querySelectorAll('.uff-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.uff-btn.${uf}`).classList.add('active');
  renderAll(); renderAttive(); renderEvase(); renderChiuse(); renderAssunto();
  renderStats();
}

/* ═══════════════════════════════════════════════════════════
   STATS
   ═══════════════════════════════════════════════════════════ */
function renderStats() {
  const list = getList();
  const counts = {
    total:   list.length,
    attiva:  list.filter(x => x.stato === 'attiva').length,
    evasa:   list.filter(x => x.stato === 'evasa').length,
    chiusa:  list.filter(x => x.stato === 'chiusa').length,
    assunto: list.filter(x => x.stato === 'assunto').length,
    pending: list.filter(x => x.stato === 'pending' || !x.stato).length,
  };
  const cards = [
    { label:'Totale',      val: counts.total,   color: 'var(--text-primary)' },
    { label:'Attive',      val: counts.attiva,  color: 'var(--blue-text)'  },
    { label:'Evase',       val: counts.evasa,   color: 'var(--green-text)' },
    { label:'Chiuse',      val: counts.chiusa,  color: 'var(--red-text)'   },
    { label:'Assunzioni',  val: counts.assunto, color: 'var(--amber-text)' },
    { label:'In attesa',   val: counts.pending, color: 'var(--text-secondary)' },
  ];
  document.getElementById('statsRow').innerHTML = cards.map(c =>
    `<div class="stat-card">
       <div class="stat-label">${c.label}</div>
       <div class="stat-val" style="color:${c.color}">${c.val}</div>
     </div>`
  ).join('');
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
const STATUS_LABELS = {
  pending: 'In attesa',
  attiva:  'Attiva',
  evasa:   'Evasa',
  chiusa:  'Chiusa',
  assunto: 'Ha assunto',
};
const STATUS_CLASS = {
  pending: 's-pending',
  attiva:  's-attiva',
  evasa:   's-evasa',
  chiusa:  's-chiusa',
  assunto: 's-assunto',
};

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function monthLabel(d) {
  if (!d) return 'Senza data';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('it-IT', { month:'long', year:'numeric' });
}
function sortItems(arr, sortVal) {
  const a = [...arr];
  if (sortVal === 'dateDesc') a.sort((x,y) => (y.data||'').localeCompare(x.data||''));
  else if (sortVal === 'dateAsc') a.sort((x,y) => (x.data||'').localeCompare(y.data||''));
  else if (sortVal === 'alpha')   a.sort((x,y) => x.nome.localeCompare(y.nome));
  return a;
}

function groupByMonth(arr) {
  const groups = {};
  arr.forEach(item => {
    const key = monthLabel(item.data);
    if (!groups[key]) groups[key] = [];
    groups[key].push(item);
  });
  return groups;
}

/* ═══════════════════════════════════════════════════════════
   RENDER ITEM
   ═══════════════════════════════════════════════════════════ */
function renderItem(item, idx) {
  const stato = item.stato || 'pending';
  const uffTag = currentUfficio === 'tutte'
    ? `<span class="status-badge" style="background:var(--bg-tertiary);color:var(--text-secondary);margin-left:4px">${item._ufficio === 'cesena' ? 'CE' : 'FC'}</span>`
    : '';

  // note section
  const noteHtml = `
    <span id="noteDisplay-${idx}" class="note-edit-wrap">
      <span style="color:var(--text-secondary);font-size:12px">${item.note ? escHtml(item.note) : '<span style="color:var(--text-tertiary)">—</span>'}</span>
      <button class="btn-note-edit" onclick="startEditNote(${idx})" title="Modifica nota"><i class="ti ti-pencil" style="font-size:11px"></i></button>
    </span>
    <span id="noteEdit-${idx}" class="note-edit-wrap" style="display:none">
      <input class="note-inline-input" id="noteInput-${idx}" value="${escAttr(item.note||'')}" placeholder="Aggiungi nota…" />
      <button class="btn-note-save"   onclick="saveNote(${idx})"   title="Salva"><i class="ti ti-check"  style="font-size:12px"></i></button>
      <button class="btn-note-cancel" onclick="cancelNote(${idx})" title="Annulla"><i class="ti ti-x" style="font-size:12px"></i></button>
    </span>`;

  return `
  <div class="company-item" id="item-${idx}">
    <div class="company-info">
      <div class="company-name">${escHtml(item.nome)} ${uffTag}</div>
      <div class="company-meta">
        ${item.data ? fmtDate(item.data) : '<span style="color:var(--text-tertiary)">Nessuna data</span>'}
        &nbsp;·&nbsp; ${noteHtml}
      </div>
    </div>
    <div class="item-actions">
      <span class="status-badge ${STATUS_CLASS[stato]}">${STATUS_LABELS[stato]}</span>
      <select onchange="changeStatus(${idx}, this.value)" style="font-size:11px;padding:3px 6px;border-radius:6px;border:0.5px solid var(--border-medium);background:var(--bg-primary);color:var(--text-primary)">
        <option value="">Cambia…</option>
        <option value="pending">In attesa</option>
        <option value="attiva">Attiva</option>
        <option value="evasa">Evasa</option>
        <option value="chiusa">Chiusa</option>
        <option value="assunto">Ha assunto</option>
      </select>
      <button class="btn btn-sm btn-danger" onclick="deleteItem(${idx})" title="Elimina"><i class="ti ti-trash"></i></button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   RENDER LISTS
   ═══════════════════════════════════════════════════════════ */
function renderList(containerId, items, sortVal, byMonth) {
  const el = document.getElementById(containerId);
  if (!items.length) { el.innerHTML = '<div class="empty-state">Nessun elemento</div>'; return; }
  const sorted = sortItems(items, sortVal);
  if (!byMonth || sortVal !== 'month') {
    el.innerHTML = sorted.map((item, i) => renderItem(item, item._realIdx)).join('');
  } else {
    const groups = groupByMonth(sorted);
    let html = '';
    Object.entries(groups).forEach(([label, grp]) => {
      html += `<div class="month-group-header">${label} <span style="font-weight:400">(${grp.length})</span></div>`;
      html += grp.map(item => renderItem(item, item._realIdx)).join('');
    });
    el.innerHTML = html;
  }
}

function tagWithRealIdx(list) {
  // Add _realIdx pointing to actual index in DB[ufficio]
  return list.map(item => {
    if (currentUfficio === 'tutte') {
      const arr = DB[item._ufficio];
      const ri = arr.findIndex(x => x === DB[item._ufficio].find(y => y.id === item.id));
      // use id-based lookup
      item._realIdx = arr.findIndex(x => x.id === item.id) + (item._ufficio === 'forli' ? 100000 : 0);
    }
    return item;
  });
}

function getTaggedList() {
  const raw = getList();
  return raw.map((item, i) => ({ ...item, _realIdx: i }));
}

function renderAll() {
  const all = getTaggedList();
  const sortVal = document.getElementById('sortAll').value;
  const filterVal = document.getElementById('filterAll').value;
  const filtered = filterVal ? all.filter(x => (x.stato||'pending') === filterVal) : all;
  renderList('listAll', filtered, sortVal, false);
}
function renderAttive()  { const l = getTaggedList().filter(x => x.stato==='attiva');  renderList('listAttive',  l, document.getElementById('sortAttive').value,  true); }
function renderEvase()   { const l = getTaggedList().filter(x => x.stato==='evasa');   renderList('listEvase',   l, document.getElementById('sortEvase').value,   true); }
function renderChiuse()  { const l = getTaggedList().filter(x => x.stato==='chiusa');  renderList('listChiuse',  l, document.getElementById('sortChiuse').value,  true); }
function renderAssunto() { const l = getTaggedList().filter(x => x.stato==='assunto'); renderList('listAssunto', l, document.getElementById('sortAssunto').value, true); }

function renderCurrentTab() {
  const active = document.querySelector('.nav-tab.active')?.dataset.tab;
  if (active === 'all')     renderAll();
  if (active === 'attive')  renderAttive();
  if (active === 'evase')   renderEvase();
  if (active === 'chiuse')  renderChiuse();
  if (active === 'assunto') renderAssunto();
  renderStats();
}

/* ═══════════════════════════════════════════════════════════
   NOTE INLINE EDIT
   ═══════════════════════════════════════════════════════════ */
function startEditNote(idx) {
  document.getElementById(`noteDisplay-${idx}`).style.display = 'none';
  document.getElementById(`noteEdit-${idx}`).style.display = 'inline-flex';
  document.getElementById(`noteInput-${idx}`).focus();
}
function saveNote(idx) {
  const val = document.getElementById(`noteInput-${idx}`).value.trim();
  const item = getTaggedList().find(x => x._realIdx === idx);
  if (!item) return;
  const arr = currentUfficio === 'tutte' ? DB[item._ufficio] : DB[currentUfficio];
  const realItem = arr.find(x => x.id === item.id);
  if (realItem) { realItem.note = val; saveData(); renderCurrentTab(); showToast('Nota aggiornata'); }
}
function cancelNote(idx) {
  document.getElementById(`noteDisplay-${idx}`).style.display = 'inline-flex';
  document.getElementById(`noteEdit-${idx}`).style.display = 'none';
}

/* ═══════════════════════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════════════════════ */
function addCompany() {
  const nome = document.getElementById('inputNome').value.trim();
  if (!nome) { showToast('Inserisci il nome azienda'); return; }
  const stato = document.getElementById('inputStato').value;
  const data  = document.getElementById('inputData').value;
  const note  = document.getElementById('inputNote').value.trim();
  const writeUfficio = currentUfficio === 'tutte' ? 'cesena' : currentUfficio;
  DB[writeUfficio].push({ id: Date.now(), nome, stato, data, note });
  saveData();
  document.getElementById('inputNome').value = '';
  document.getElementById('inputStato').value = 'pending';
  document.getElementById('inputData').value = '';
  document.getElementById('inputNote').value = '';
  renderCurrentTab();
  showToast(`"${nome}" aggiunta (${writeUfficio})`);
}

function changeStatus(idx, newStato) {
  if (!newStato) return;
  const list = getTaggedList();
  const item = list.find(x => x._realIdx === idx);
  if (!item) return;
  const arr = currentUfficio === 'tutte' ? DB[item._ufficio] : DB[currentUfficio];
  const realItem = arr.find(x => x.id === item.id);
  if (realItem) { realItem.stato = newStato; saveData(); renderCurrentTab(); showToast('Stato aggiornato'); }
}

function deleteItem(idx) {
  const list = getTaggedList();
  const item = list.find(x => x._realIdx === idx);
  if (!item) return;
  if (!confirm(`Eliminare "${item.nome}"?`)) return;
  const uf = currentUfficio === 'tutte' ? item._ufficio : currentUfficio;
  DB[uf] = DB[uf].filter(x => x.id !== item.id);
  saveData();
  renderCurrentTab();
  showToast('Azienda eliminata');
}

/* ═══════════════════════════════════════════════════════════
   EXPORT CSV
   ═══════════════════════════════════════════════════════════ */
function exportCSV(tabName) {
  let items;
  const all = getTaggedList();
  if (tabName === 'all')     items = all;
  else if (tabName === 'attive')  items = all.filter(x => x.stato === 'attiva');
  else if (tabName === 'evase')   items = all.filter(x => x.stato === 'evasa');
  else if (tabName === 'chiuse')  items = all.filter(x => x.stato === 'chiusa');
  else if (tabName === 'assunto') items = all.filter(x => x.stato === 'assunto');
  else items = all;

  if (!items.length) { showToast('Nessun dato da esportare'); return; }

  const header = currentUfficio === 'tutte'
    ? 'Azienda,Stato,Data,Note,Filiale'
    : 'Azienda,Stato,Data,Note';

  const rows = items.map(x => {
    const cols = [
      `"${(x.nome||'').replace(/"/g,'""')}"`,
      STATUS_LABELS[x.stato||'pending'],
      x.data ? fmtDate(x.data) : '',
      `"${(x.note||'').replace(/"/g,'""')}"`,
    ];
    if (currentUfficio === 'tutte') cols.push(x._ufficio === 'cesena' ? 'Cesena' : 'Forlì');
    return cols.join(',');
  });

  const csv = '\uFEFF' + [header, ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `aziende_${tabName}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════════════════════════
   TAB SWITCHER
   ═══════════════════════════════════════════════════════════ */
const TABS = ['insert','all','attive','evase','chiuse','assunto'];
function switchTab(name) {
  TABS.forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
    document.querySelector(`[data-tab="${t}"]`)?.classList.toggle('active', t === name);
  });
  if (name === 'all')     renderAll();
  if (name === 'attive')  renderAttive();
  if (name === 'evase')   renderEvase();
  if (name === 'chiuse')  renderChiuse();
  if (name === 'assunto') renderAssunto();
}

/* ═══════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ═══════════════════════════════════════════════════════════
   ESCAPE HELPERS
   ═══════════════════════════════════════════════════════════ */
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════ */
// set today as default date
document.getElementById('inputData').value = new Date().toISOString().slice(0,10);
renderStats();

// keyboard shortcut: Enter in nome field → add
document.getElementById('inputNome').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCompany();
});
</script>
