
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
:root{--c-cesena:#185FA5;--c-forli:#3B6D11}
.app{padding:1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem}
.header h1{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--color-text-secondary);transition:all .15s}
.tab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.section-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-cesena{background:var(--color-background-info);color:var(--color-text-info)}
.badge-forli{background:#EAF3DE;color:#27500A}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:8px;align-items:end}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--color-text-secondary)}
input,select{width:100%;padding:6px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary)}
input:focus,select:focus{outline:2px solid var(--color-border-info);border-color:transparent}
.btn{padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.btn-primary:hover{opacity:.85;background:var(--color-background-info)}
.btn-danger{color:var(--color-text-danger);border-color:transparent}
.btn-danger:hover{background:var(--color-background-danger)}
.btn-sm{padding:4px 10px;font-size:12px}
.list-controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.list-controls select{width:auto;font-size:12px;padding:5px 8px}
.company-list{display:flex;flex-direction:column;gap:6px}
.company-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);gap:12px}
.company-info{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.company-name{font-size:14px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.company-meta{font-size:12px;color:var(--color-text-secondary)}
.status-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.s-evasa{background:#EAF3DE;color:#27500A}
.s-chiusa{background:#FCEBEB;color:#A32D2D}
.s-assunto{background:#FAEEDA;color:#633806}
.s-pending{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.month-header{font-size:12px;font-weight:500;color:var(--color-text-secondary);padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary);margin:8px 0 4px}
.empty{text-align:center;padding:1.5rem;color:var(--color-text-tertiary);font-size:13px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.5rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem 1rem}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.nav-tabs{display:flex;gap:4px;margin-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:8px}
.nav-tab{padding:5px 12px;border-radius:var(--border-radius-md);border:none;background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
.nav-tab.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.ufficio-switcher{display:flex;gap:6px}
.uff-btn{padding:5px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:13px;font-weight:500}
.uff-btn.cesena.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.uff-btn.forli.active{background:#EAF3DE;color:#27500A;border-color:transparent}
.uff-btn:not(.active){color:var(--color-text-secondary)}
</style>

<h2 class="sr-only">Gestione aziende commerciale — uffici Cesena e Forlì</h2>

<div class="app">
  <div class="header">
    <h1><i class="ti ti-building-store" aria-hidden="true"></i> Gestione Aziende</h1>
    <div class="ufficio-switcher">
      <button class="uff-btn cesena active" onclick="switchUfficio('cesena')">Cesena</button>
      <button class="uff-btn forli" onclick="switchUfficio('forli')">Forlì</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('add')">+ Inserisci</button>
    <button class="nav-tab" onclick="switchView('evase')">Evase</button>
    <button class="nav-tab" onclick="switchView('chiuse')">Chiuse</button>
    <button class="nav-tab" onclick="switchView('assunto')">Hanno assunto</button>
    <button class="nav-tab" onclick="switchView('tutte')">Tutte</button>
  </div>

  <div id="view-add">
    <div class="section">
      <div class="section-title"><i class="ti ti-circle-plus" aria-hidden="true"></i> Nuova azienda — <span id="ufficio-label" style="font-weight:400;font-size:13px;"></span></div>
      <div class="form-row">
        <div class="form-group"><label>Nome azienda</label><input type="text" id="inp-nome" placeholder="es. Mario Rossi Srl"></div>
        <div class="form-group"><label>Stato ricerca</label>
          <select id="inp-stato">
            <option value="pending">— in attesa —</option>
            <option value="evasa">Evasa</option>
            <option value="chiusa">Chiusa</option>
            <option value="assunto">Hanno assunto da soli</option>
          </select>
        </div>
        <div class="form-group"><label>Data</label><input type="date" id="inp-data"></div>
        <div class="form-group"><label>Note (opz.)</label><input type="text" id="inp-note" placeholder="Appunti..."></div>
        <div class="form-group"><label>&nbsp;</label><button class="btn btn-primary" onclick="addAzienda()"><i class="ti ti-plus" aria-hidden="true"></i> Aggiungi</button></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-list" aria-hidden="true"></i> Elenco <span id="uff-badge-label"></span></div>
      <div class="list-controls">
        <select id="all-sort" onchange="renderAll()">
          <option value="data-desc">Data ↓</option>
          <option value="data-asc">Data ↑</option>
          <option value="alfa">Alfabetico</option>
        </select>
        <select id="all-filter" onchange="renderAll()">
          <option value="">Tutti gli stati</option>
          <option value="pending">In attesa</option>
          <option value="evasa">Evase</option>
          <option value="chiusa">Chiuse</option>
          <option value="assunto">Hanno assunto</option>
        </select>
      </div>
      <div class="company-list" id="list-all"></div>
    </div>
  </div>

  <div id="view-evase" style="display:none">
    <div class="section">
      <div class="section-title" style="color:#27500A"><i class="ti ti-check" aria-hidden="true"></i> Ricerche Evase</div>
      <div class="list-controls">
        <select id="evase-sort" onchange="renderFiltered('evase')">
          <option value="data-desc">Data ↓</option>
          <option value="data-asc">Data ↑</option>
          <option value="alfa">Alfabetico</option>
          <option value="mese">Per mese</option>
        </select>
      </div>
      <div class="company-list" id="list-evase"></div>
    </div>
  </div>

  <div id="view-chiuse" style="display:none">
    <div class="section">
      <div class="section-title" style="color:#A32D2D"><i class="ti ti-x" aria-hidden="true"></i> Ricerche Chiuse</div>
      <div class="list-controls">
        <select id="chiuse-sort" onchange="renderFiltered('chiusa')">
          <option value="data-desc">Data ↓</option>
          <option value="data-asc">Data ↑</option>
          <option value="alfa">Alfabetico</option>
          <option value="mese">Per mese</option>
        </select>
      </div>
      <div class="company-list" id="list-chiuse"></div>
    </div>
  </div>

  <div id="view-assunto" style="display:none">
    <div class="section">
      <div class="section-title" style="color:#633806"><i class="ti ti-user-check" aria-hidden="true"></i> Hanno assunto da soli</div>
      <div class="list-controls">
        <select id="assunto-sort" onchange="renderFiltered('assunto')">
          <option value="data-desc">Data ↓</option>
          <option value="data-asc">Data ↑</option>
          <option value="alfa">Alfabetico</option>
          <option value="mese">Per mese</option>
        </select>
      </div>
      <div class="company-list" id="list-assunto"></div>
    </div>
  </div>

  <div id="view-tutte" style="display:none">
    <div class="section">
      <div class="section-title"><i class="ti ti-layout-list" aria-hidden="true"></i> Tutte le aziende (entrambi gli uffici)</div>
      <div class="list-controls">
        <select id="tutte-sort" onchange="renderTutte()">
          <option value="data-desc">Data ↓</option>
          <option value="data-asc">Data ↑</option>
          <option value="alfa">Alfabetico</option>
        </select>
        <select id="tutte-uff" onchange="renderTutte()">
          <option value="">Entrambi gli uffici</option>
          <option value="cesena">Solo Cesena</option>
          <option value="forli">Solo Forlì</option>
        </select>
        <select id="tutte-stato" onchange="renderTutte()">
          <option value="">Tutti gli stati</option>
          <option value="pending">In attesa</option>
          <option value="evasa">Evase</option>
          <option value="chiusa">Chiuse</option>
          <option value="assunto">Hanno assunto</option>
        </select>
      </div>
      <div class="company-list" id="list-tutte"></div>
    </div>
  </div>
</div>

<script>
const KEY = 'aziende_v1';
let currentUfficio = 'cesena';
let currentView = 'add';

function loadData(){
  try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}
}
function saveData(d){
  try{localStorage.setItem(KEY,JSON.stringify(d))}catch(e){}
}

function getDefaultData(){
  return [
    {id:1,nome:'Esempio Srl',ufficio:'cesena',stato:'evasa',data:'2025-03-15',note:'Prima ricerca'},
    {id:2,nome:'Beta Spa',ufficio:'cesena',stato:'chiusa',data:'2025-04-02',note:''},
    {id:3,nome:'Gamma Sas',ufficio:'forli',stato:'assunto',data:'2025-04-20',note:''},
    {id:4,nome:'Delta Srl',ufficio:'forli',stato:'pending',data:'2025-05-01',note:''},
  ];
}

let data = loadData();
if(data.length===0){data=getDefaultData();saveData(data);}
let nextId = Math.max(0,...data.map(d=>d.id))+1;

function switchUfficio(u){
  currentUfficio=u;
  document.querySelectorAll('.uff-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.uff-btn.'+u).classList.add('active');
  renderAll();renderStats();updateLabels();
  if(currentView!=='tutte')renderCurrentView();
}
function switchView(v){
  currentView=v;
  ['add','evase','chiuse','assunto','tutte'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?'block':'none';
  });
  document.querySelectorAll('.nav-tab').forEach((b,i)=>{
    b.classList.toggle('active',['add','evase','chiuse','assunto','tutte'][i]===v);
  });
  if(v==='evase')renderFiltered('evasa');
  if(v==='chiuse')renderFiltered('chiusa');
  if(v==='assunto')renderFiltered('assunto');
  if(v==='tutte')renderTutte();
  if(v==='add'){renderAll();}
}
function updateLabels(){
  const label=currentUfficio==='cesena'?'Ufficio Cesena':'Ufficio Forlì';
  document.getElementById('ufficio-label').textContent=label;
  const bd=document.getElementById('uff-badge-label');
  bd.innerHTML=`<span class="badge badge-${currentUfficio}">${label}</span>`;
}

function addAzienda(){
  const nome=document.getElementById('inp-nome').value.trim();
  if(!nome){alert('Inserisci il nome dell\'azienda');return;}
  const stato=document.getElementById('inp-stato').value;
  const data_val=document.getElementById('inp-data').value;
  const note=document.getElementById('inp-note').value.trim();
  const item={id:nextId++,nome,ufficio:currentUfficio,stato,data:data_val,note};
  data.push(item);saveData(data);
  document.getElementById('inp-nome').value='';
  document.getElementById('inp-stato').value='pending';
  document.getElementById('inp-note').value='';
  renderAll();renderStats();
}
function deleteAzienda(id){
  if(!confirm('Eliminare questa azienda?'))return;
  data=data.filter(d=>d.id!==id);saveData(data);
  renderAll();renderStats();renderCurrentView();
}
function changeStato(id,v){
  const item=data.find(d=>d.id===id);
  if(item){
    item.stato=v;
    if(!item.data&&v!=='pending')item.data=new Date().toISOString().slice(0,10);
    saveData(data);renderAll();renderStats();renderCurrentView();
  }
}
function renderCurrentView(){
  if(currentView==='evase')renderFiltered('evasa');
  else if(currentView==='chiuse')renderFiltered('chiusa');
  else if(currentView==='assunto')renderFiltered('assunto');
  else if(currentView==='tutte')renderTutte();
}

const MESI=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
function formatDate(d){if(!d)return'—';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function getMese(d){if(!d)return'Senza data';const p=d.split('-');return MESI[parseInt(p[1])-1]+' '+p[0]}

function sortItems(items,sortVal){
  const copy=[...items];
  if(sortVal==='data-desc')copy.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  else if(sortVal==='data-asc')copy.sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  else if(sortVal==='alfa')copy.sort((a,b)=>a.nome.localeCompare(b.nome,'it'));
  return copy;
}

function renderCompanyItem(item,showUfficio=false){
  const stati={evasa:{label:'Evasa',cls:'s-evasa'},chiusa:{label:'Chiusa',cls:'s-chiusa'},assunto:{label:'Hanno assunto',cls:'s-assunto'},pending:{label:'In attesa',cls:'s-pending'}};
  const s=stati[item.stato]||stati.pending;
  const uffLabel=item.ufficio==='cesena'?'Cesena':'Forlì';
  return `<div class="company-item">
    <div class="company-info">
      <span class="company-name">${item.nome}</span>
      <span class="company-meta">${formatDate(item.data)}${item.note?' · '+item.note:''}${showUfficio?' · '+uffLabel:''}</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
      <span class="status-badge ${s.cls}">${s.label}</span>
      <select class="btn btn-sm" onchange="changeStato(${item.id},this.value)" style="font-size:11px;padding:3px 6px;width:auto">
        <option value="" disabled selected>Modifica</option>
        <option value="pending">In attesa</option>
        <option value="evasa">Evasa</option>
        <option value="chiusa">Chiusa</option>
        <option value="assunto">Hanno assunto</option>
      </select>
      <button class="btn btn-danger btn-sm" onclick="deleteAzienda(${item.id})" aria-label="Elimina"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>
  </div>`;
}

function renderAll(){
  const sortVal=document.getElementById('all-sort').value;
  const filterVal=document.getElementById('all-filter').value;
  let items=data.filter(d=>d.ufficio===currentUfficio);
  if(filterVal)items=items.filter(d=>d.stato===filterVal);
  items=sortItems(items,sortVal);
  const el=document.getElementById('list-all');
  if(items.length===0){el.innerHTML='<div class="empty">Nessuna azienda inserita</div>';return;}
  el.innerHTML=items.map(i=>renderCompanyItem(i)).join('');
}

function renderFiltered(stato){
  const viewMap={evasa:'evase',chiusa:'chiuse',assunto:'assunto'};
  const listMap={evasa:'list-evase',chiusa:'list-chiuse',assunto:'list-assunto'};
  const sortId={evasa:'evase-sort',chiusa:'chiuse-sort',assunto:'assunto-sort'};
  const sortVal=document.getElementById(sortId[stato]).value;
  let items=data.filter(d=>d.ufficio===currentUfficio&&d.stato===stato);
  const el=document.getElementById(listMap[stato]);
  if(items.length===0){el.innerHTML='<div class="empty">Nessuna azienda in questo elenco</div>';return;}
  if(sortVal==='mese'){
    const sorted=sortItems(items,'data-desc');
    const grouped={};
    sorted.forEach(i=>{const m=getMese(i.data);if(!grouped[m])grouped[m]=[];grouped[m].push(i);});
    let html='';
    Object.keys(grouped).forEach(m=>{
      html+=`<div class="month-header"><i class="ti ti-calendar" aria-hidden="true"></i> ${m}</div>`;
      html+=grouped[m].map(i=>renderCompanyItem(i)).join('');
    });
    el.innerHTML=html;
  }else{
    el.innerHTML=sortItems(items,sortVal).map(i=>renderCompanyItem(i)).join('');
  }
}

function renderTutte(){
  const sortVal=document.getElementById('tutte-sort').value;
  const uffFilter=document.getElementById('tutte-uff').value;
  const statoFilter=document.getElementById('tutte-stato').value;
  let items=[...data];
  if(uffFilter)items=items.filter(d=>d.ufficio===uffFilter);
  if(statoFilter)items=items.filter(d=>d.stato===statoFilter);
  items=sortItems(items,sortVal);
  const el=document.getElementById('list-tutte');
  if(items.length===0){el.innerHTML='<div class="empty">Nessuna azienda trovata</div>';return;}
  el.innerHTML=items.map(i=>renderCompanyItem(i,true)).join('');
}

function renderStats(){
  const mine=data.filter(d=>d.ufficio===currentUfficio);
  const evase=mine.filter(d=>d.stato==='evasa').length;
  const chiuse=mine.filter(d=>d.stato==='chiusa').length;
  const assunto=mine.filter(d=>d.stato==='assunto').length;
  const pending=mine.filter(d=>d.stato==='pending').length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-label">Totale</div><div class="stat-val">${mine.length}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:#27500A">Evase</div><div class="stat-val" style="color:#27500A">${evase}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:#A32D2D">Chiuse</div><div class="stat-val" style="color:#A32D2D">${chiuse}</div></div>
    <div class="stat-card"><div class="stat-label" style="color:#633806">Assunto</div><div class="stat-val" style="color:#633806">${assunto}</div></div>
    <div class="stat-card"><div class="stat-label">In attesa</div><div class="stat-val">${pending}</div></div>
  `;
}

document.getElementById('inp-data').value=new Date().toISOString().slice(0,10);
updateLabels();renderStats();renderAll();
</script>
