name: Deploy su Firebase Hosting

# Pubblica automaticamente il sito ad ogni push su main.
on:
  push:
    branches:
      - main
  workflow_dispatch: # permette anche l'avvio manuale dalla scheda "Actions"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Deploy su Firebase Hosting (produzione)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUNTO_UMANA }}
          projectId: punto-umana
          channelId: live
